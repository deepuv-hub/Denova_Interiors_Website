  <!-- 🚀 SMART SCRIPT LOADING (CRITICAL FIX) -->
  <script>
    function loadTrackingScripts() {
      if (window.scriptsLoaded) return;
      window.scriptsLoaded = true;

      // Google Tag Manager
      (function(w,d,s,l,i){
        w[l]=w[l]||[];
        w[l].push({'gtm.start': new Date().getTime(),event:'gtm.js'});
        var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s);
        j.async=true;
        j.src='https://www.googletagmanager.com/gtm.js?id=GTM-59NLP9MV';
        f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer');

      // Google Ads
      var gtagScript = document.createElement("script");
      gtagScript.src = "https://www.googletagmanager.com/gtag/js?id=AW-11303451952";
      gtagScript.async = true;
      document.head.appendChild(gtagScript);

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-11303451952');

      // PostHog (optional – can disable if not critical)
      var ph = document.createElement("script");
      ph.src = "https://us.i.posthog.com/static/array.js";
      ph.async = true;
      document.head.appendChild(ph);
    }

    // Load only after real user interaction
    ['click','scroll','mousemove','touchstart'].forEach(event => {
      window.addEventListener(event, loadTrackingScripts, { once: true });
    });
